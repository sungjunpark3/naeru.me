<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1f2e">
<meta name="robots" content="noindex, nofollow">
<title>Naerum Naerum</title>
<link rel="icon" type="image/png" href="img/favicon.png">
<link rel="apple-touch-icon" href="img/apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:title" content="내루미">
<meta property="og:url" content="https://naeru.me/">
<meta property="og:image" content="https://naeru.me/img/og.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.open-meteo.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap"
      rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1f2e; /* 영상 로딩 전 어두운 배경 */
    font-family: "Comfortaa", "Avenir Next", "Apple SD Gothic Neo",
                 -apple-system, sans-serif;
  }

  /* 시간대별 정지 프레임(각 영상의 첫 프레임)은 JS가
     --still(전체 배경)·--freeze-a/--freeze-b(하늘 프리즈)
     변수로 주입한다 */

  /* 루프 순간 브라우저가 비디오를 한 프레임 놓쳐도
     어두운 배경 대신 동일한 정지 프레임이 보이도록,
     첫 프레임(=핑퐁 마지막 프레임)을 영상 뒤에 깔아둠 */
  .bg-still {
    position: fixed;
    inset: 0;
    background-image: var(--still);
    background-size: cover;
    background-position: center;
  }

  /* ── 배경 영상: A/B 두 장을 겹쳐두고 시간대가 바뀌면
     currentTime을 맞춘 뒤 크로스페이드(같은 원본 영상의
     색보정 변형들이라 픽셀이 정렬됨 → 순수 색상 디졸브) ── */
  video.bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 2.5s ease;
  }
  video.bg.on { opacity: 1; }

  /* ── 구름 고정: 첫 프레임을 하늘 영역에만 덮어서
     구름 움직임을 정지. 영상과 같은 16:9 + cover라서
     창 크기와 무관하게 픽셀이 정확히 정렬됨.
     마스크는 세로(하늘~지평선 위) × 가로(양옆 나무 회피)
     교집합, 경계는 그라디언트로 부드럽게 블렌드.
     비디오와 같은 이유로 A/B 두 장을 겹쳐 크로스페이드 ── */
  .sky-freeze {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 2.5s ease;
    -webkit-mask-image:
      linear-gradient(to bottom,
        black 0%, black 42%, transparent 58%),
      linear-gradient(to right,
        transparent 16%, black 28%, black 68%, transparent 80%);
    -webkit-mask-composite: source-in;
    mask-image:
      linear-gradient(to bottom,
        black 0%, black 42%, transparent 58%),
      linear-gradient(to right,
        transparent 16%, black 28%, black 68%, transparent 80%);
    mask-composite: intersect;
  }
  .sky-freeze.on { opacity: 1; }
  #freezeA { background-image: var(--freeze-a); }
  #freezeB { background-image: var(--freeze-b); }

  /* ── 비 레이어: 하늘 프리즈 위에서도 비가 계속 내리도록
     영상이 아닌 DOM에서 렌더. 줄기는 수직 텍스처, 레이어를
     skewX로 기울여 낙하 방향 = 줄기 축. 텍스처 높이(1024px)
     단위로 background-position을 굴리므로 완벽 루프.
     원경(가늘고 느림)/근경(굵고 빠름) 2겹으로 깊이감 ──── */
  .rain {
    position: fixed;
    inset: -14% -8%;
    pointer-events: none;
    transform: skewX(-8deg);
    background-repeat: repeat;
    opacity: 0;
    visibility: hidden;
    transition: opacity 2.5s ease, visibility 2.5s;
    animation: rainfall linear infinite;
    animation-play-state: paused;
  }
  .rain-far  { background-image: url("img/rain-far.png");  animation-duration: 1.8s; }
  .rain-near { background-image: url("img/rain-near.png"); animation-duration: 0.95s; }
  @keyframes rainfall { to { background-position: 0 1024px; } }
  body[data-weather="rain"] .rain {
    visibility: visible;
    animation-play-state: running;
  }
  body[data-weather="rain"] .rain-far  { opacity: 0.5; }
  body[data-weather="rain"] .rain-near { opacity: 0.62; }
  /* 밤에는 줄기가 너무 하얗게 뜨지 않게 */
  body[data-weather="rain"][data-variant^="night"] .rain-far  { opacity: 0.26; }
  body[data-weather="rain"][data-variant^="night"] .rain-near { opacity: 0.34; }

  /* 은은한 비네트 — cozy한 깊이감, 밤에는 조금 더 깊게 */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
      ellipse at center,
      transparent 55%,
      rgba(10, 14, 25, 0.42) 100%
    );
    opacity: 0.85;
    transition: opacity 2.5s ease;
  }
  body[data-variant^="night"] .vignette { opacity: 1; }
  body[data-variant="day"]    .vignette { opacity: 0.6; }

  /* ── 시계: 내루미를 가리지 않도록 상단 배치 ─────── */
  .clock-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 8vh;
    user-select: none;
    z-index: 6;              /* 생일 장식(색종이·배너)보다 위, 시각 가독성 유지 */
  }

  .clock-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    animation: breathe 6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  .time {
    font-size: clamp(3.5rem, 10vw, 7.5rem);
    font-weight: 600;
    letter-spacing: 0.05em;
    color: rgba(255, 252, 245, 0.96);
    text-shadow:
      0 2px 24px rgba(20, 25, 40, 0.55),
      0 0 60px rgba(255, 240, 210, 0.25);
    font-variant-numeric: tabular-nums;
  }

  .time .colon { animation: blink 2s ease-in-out infinite; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }

  .date {
    font-size: clamp(1rem, 2.2vw, 1.5rem);
    font-weight: 400;
    letter-spacing: 0.18em;
    color: rgba(255, 250, 240, 0.85);
    text-shadow: 0 1px 12px rgba(20, 25, 40, 0.6);
  }

  /* 움직임 최소화 설정 존중: 영상 없이 정지 프레임만 표시
     (JS도 이 경우 영상을 아예 로드하지 않음) */
  @media (prefers-reduced-motion: reduce) {
    .clock-inner, .time .colon { animation: none !important; }
    .rain { display: none !important; }
    video.bg { display: none !important; }
    .sky-freeze { transition: none !important; }
  }

  /* ── 생일 장식(매년 7/21, Asia/Seoul): 상단 깃발줄 + 배너 +
     내루미 머리 위 꼬깔모자 + 색종이. 기본 숨김, JS가 생일에만
     body.birthday를 붙여 노출 ─────────────────────────────── */
  #party { position: fixed; inset: 0; pointer-events: none;
    z-index: 5; display: none; }
  body.birthday #party { display: block; }

  /* 상단 깃발 줄(뷰포트 폭에 맞춰 JS가 곡선+깃발 생성) */
  #garland { position: fixed; top: 0; left: 0; width: 100%; line-height: 0; }

  /* 생일 배너(플래카드) — 시계와 내루미 사이 빈 공간에 */
  .bday-banner {
    position: fixed; left: 50%; top: 30vh; transform: translateX(-50%);
    padding: .5em 2.3em; white-space: nowrap;
    font-weight: 600; font-size: clamp(1.05rem, 2.7vw, 1.75rem);
    letter-spacing: .01em; color: #fff7fa;
    background: linear-gradient(180deg, #ff90ac, #ec4f78);
    clip-path: polygon(0 0, 100% 0, calc(100% - 17px) 50%, 100% 100%,
      0 100%, 17px 50%);
    text-shadow: 0 1px 6px rgba(120, 20, 50, .45);
    box-shadow: 0 10px 26px rgba(180, 40, 80, .32),
      inset 0 2px 0 rgba(255, 255, 255, .4),
      inset 0 -3px 6px rgba(150, 20, 60, .25);
    animation: bannerSway 5s ease-in-out infinite;
  }
  .bday-banner::before, .bday-banner::after {
    content: ""; position: absolute; top: -1.05em;
    width: 2px; height: 1.1em; background: rgba(255, 255, 255, .55);
  }
  .bday-banner::before { left: 26%; transform: rotate(9deg); }
  .bday-banner::after  { right: 26%; transform: rotate(-9deg); }
  @keyframes bannerSway {
    0%, 100% { transform: translateX(-50%) rotate(-1.1deg); }
    50%      { transform: translateX(-50%) rotate(1.1deg); }
  }

  /* 꼬깔모자 — JS가 내루미 머리 위치(cover 변환)에 배치·크기 조정 */
  #hat { position: fixed; left: 0; top: 0; transform-origin: 50% 100%;
    filter: drop-shadow(0 6px 8px rgba(40, 20, 30, .35));
    animation: hatBob 4s ease-in-out infinite; }
  #hat svg { display: block; width: 100%; height: auto; }
  @keyframes hatBob {
    0%, 100% { transform: translate(-50%, -100%) rotate(-13deg); }
    50%      { transform: translate(-50%, -100%) rotate(-9deg); }
  }

  /* 색종이 */
  .confetti { position: fixed; top: -6vh; width: 9px; height: 13px;
    opacity: .85; border-radius: 1px; animation: confFall linear infinite; }
  @keyframes confFall {
    0%   { transform: translateY(-10vh) rotate(0); }
    100% { transform: translateY(112vh) rotate(540deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .bday-banner, #hat { animation: none; }
    #hat { transform: translate(-50%, -100%) rotate(-11deg); }
    .confetti { display: none; }
  }
</style>
</head>
<body>

<div class="bg-still"></div>

<video id="bgA" class="bg" muted loop playsinline preload="auto"></video>
<video id="bgB" class="bg" muted loop playsinline preload="none"></video>

<div id="freezeA" class="sky-freeze"></div>
<div id="freezeB" class="sky-freeze"></div>

<div class="rain rain-far"></div>
<div class="rain rain-near"></div>

<div class="vignette"></div>

<!-- 생일 장식(기본 숨김) — 아래 스크립트가 7/21에만 노출 -->
<div id="party">
  <div id="garland"></div>
  <div class="bday-banner">생일 축하해, 내루미! &#127874;</div>
  <div id="hat">
    <svg viewBox="0 0 100 152" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pcone" x1="0" y1="0" x2=".45" y2="1">
          <stop offset="0" stop-color="#ff92b0"/>
          <stop offset="1" stop-color="#e64d76"/>
        </linearGradient>
        <pattern id="pstripe" width="26" height="26"
                 patternUnits="userSpaceOnUse" patternTransform="rotate(-34)">
          <rect width="13" height="26" fill="#fff4ea"/>
        </pattern>
        <clipPath id="pclip"><path d="M50 8 L85 138 Q50 127 15 138 Z"/></clipPath>
      </defs>
      <path d="M50 8 L85 138 Q50 127 15 138 Z" fill="url(#pcone)"/>
      <g clip-path="url(#pclip)" opacity=".72">
        <rect x="0" y="0" width="100" height="152" fill="url(#pstripe)"/>
      </g>
      <path d="M15 138 Q50 127 85 138 Q50 150 15 138 Z" fill="#ffd6e0"/>
      <g>
        <circle cx="50" cy="9" r="10.5" fill="#ffdd7a"/>
        <circle cx="45.5" cy="5.5" r="5.2" fill="#fff0b6"/>
        <circle cx="55" cy="7" r="5" fill="#ffd464"/>
        <circle cx="50" cy="13" r="5" fill="#ffd868"/>
        <circle cx="52" cy="9" r="3.4" fill="#fff3c6"/>
      </g>
    </svg>
  </div>
  <div id="confetti"></div>
</div>

<div class="clock-wrap">
  <div class="clock-inner">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>
</div>

<script>
(function () {
  var TZ = "Asia/Seoul";

  /* ── 시간대 → 배경 밴드 ──────────────────────────
     서울의 실제 일출·일몰(Open-Meteo daily) 기준:
     dawn = 일출−40분~+50분, dusk = 일몰−50분~+40분,
     그 사이가 day, 나머지가 night. 실황을 아직 못 받았으면
     고정 밴드(05–08/08–17/17–20/20–05)로 폴백.
     서울에 비가 오면 "-rain" 변형(흐린 그레이딩+비 레이어).
     URL 강제: ?v=dawn|day|dusk|night, ?h=22, ?w=rain|clear */
  var sun = null;                    // {sr, ss} 자정 기준 분 단위

  function bandFor(min) {
    if (sun) {
      if (min >= sun.sr - 40 && min < sun.sr + 50) return "dawn";
      if (min >= sun.sr + 50 && min < sun.ss - 50) return "day";
      if (min >= sun.ss - 50 && min < sun.ss + 40) return "dusk";
      return "night";
    }
    var h = Math.floor(min / 60);
    if (h >= 5 && h < 8)   return "dawn";
    if (h >= 8 && h < 17)  return "day";
    if (h >= 17 && h < 20) return "dusk";
    return "night";
  }

  var params  = new URLSearchParams(location.search);
  var forced  = params.get("v");
  var fakeH   = params.get("h");
  var forcedW = params.get("w");
  if (["dawn", "day", "dusk", "night"].indexOf(forced) < 0) forced = null;
  if (["rain", "clear"].indexOf(forcedW) < 0) forcedW = null;

  /* 직전 방문에서 저장한 날씨·일출일몰(3시간 이내)로 즉시
     시작해서 첫 화면부터 정확한 변형을 띄우고, 실황 도착 후
     다르면 크로스페이드로 정정 */
  var WKEY    = "naeru-weather";
  var cachedW = null;
  try {
    var c = JSON.parse(localStorage.getItem(WKEY) || "null");
    if (c && Date.now() - c.t < 3 * 3600000 &&
        (c.w === "rain" || c.w === "clear")) {
      cachedW = c.w;
      if (typeof c.sr === "number" && typeof c.ss === "number") {
        sun = { sr: c.sr, ss: c.ss };
      }
    }
  } catch (e) {}
  var weather = forcedW || cachedW || "clear";

  function seoulMinutes(now) {
    if (fakeH !== null) return (parseInt(fakeH, 10) % 24) * 60;
    var t = new Intl.DateTimeFormat("en-GB", {
      timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
    }).formatToParts(now);
    var p = {};
    t.forEach(function (x) { p[x.type] = x.value; });
    return (parseInt(p.hour, 10) % 24) * 60 + parseInt(p.minute, 10);
  }

  function currentVariant() {
    var band = forced || bandFor(seoulMinutes(new Date()));
    return band + (weather === "rain" ? "-rain" : "");
  }

  /* ── 서울 실황 (Open-Meteo, 키 불필요·CORS 허용) ──
     WMO 코드가 강수(이슬비·비·눈·소나기·뇌우)면 rain.
     일출·일몰도 같은 요청으로 받아 밴드 계산에 사용 */
  var METEO = "https://api.open-meteo.com/v1/forecast" +
              "?latitude=37.5665&longitude=126.978" +
              "&current=weather_code" +
              "&daily=sunrise,sunset&forecast_days=1" +
              "&timezone=Asia%2FSeoul";
  var RAINY = [51, 53, 55, 56, 57, 61, 63, 65, 66, 67,
               71, 73, 75, 77, 80, 81, 82, 85, 86, 95, 96, 99];

  function minutesOf(iso) {     // "2026-07-10T05:17" → 317
    var m = /T(\d\d):(\d\d)/.exec(iso || "");
    return m ? parseInt(m[1], 10) * 60 + parseInt(m[2], 10) : null;
  }

  var lastFetch = 0;
  function fetchWeather() {
    if (forcedW) return Promise.resolve();
    return fetch(METEO)
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var c = d && d.current && d.current.weather_code;
        weather   = RAINY.indexOf(c) >= 0 ? "rain" : "clear";
        lastFetch = Date.now();
        if (d && d.daily) {
          var sr = minutesOf(d.daily.sunrise && d.daily.sunrise[0]);
          var ss = minutesOf(d.daily.sunset  && d.daily.sunset[0]);
          if (sr !== null && ss !== null) sun = { sr: sr, ss: ss };
        }
        try {
          localStorage.setItem(WKEY, JSON.stringify({
            w: weather, t: lastFetch,
            sr: sun && sun.sr, ss: sun && sun.ss
          }));
        } catch (e) {}
      })
      .catch(function () {});   // 실패 시 마지막 상태 유지
  }

  /* ── A/B 비디오 + 하늘 프리즈 크로스페이드 ────── */
  var vids    = [document.getElementById("bgA"), document.getElementById("bgB")];
  var freezes = [document.getElementById("freezeA"), document.getElementById("freezeB")];
  var slot    = 0;          // 현재 활성 슬롯 (0=A, 1=B)
  var active  = null;       // 현재 변형 이름
  var root    = document.documentElement;
  var noMotion =
    matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* HEVC 10-bit(같은 화질, 용량↓)를 지원하면 우선 사용,
     아니면 H.264. 재생 에러 시에도 H.264로 폴백 */
  var HEVC = document.createElement("video")
    .canPlayType('video/mp4; codecs="hvc1.2.4.L153.B0"') !== "";

  function srcOf(v) {
    return "img/meadow-" + v + (HEVC ? ".hevc" : "") + ".mp4";
  }
  function freezeOf(v) { return 'url("img/sky-' + v + '.jpg")'; }

  vids.forEach(function (v) {
    v.addEventListener("error", function () {
      if (!HEVC || !v.getAttribute("src")) return;
      HEVC = false;
      v.src = srcOf(active);
      v.play().catch(function () {});
    });
  });

  function show(variant) {           // 최초 로드: 즉시 표시
    active = variant;
    document.body.dataset.variant = variant;
    document.body.dataset.weather = weather;
    root.style.setProperty("--still", freezeOf(variant));
    root.style.setProperty("--freeze-a", freezeOf(variant));
    freezes[slot].classList.add("on");
    if (noMotion) return;            // 움직임 최소화: 영상 로드 생략
    var v = vids[slot];
    v.poster = "img/sky-" + variant + ".jpg";
    v.src = srcOf(variant);
    v.classList.add("on");
    v.play().catch(function () {});
  }

  function crossfadeTo(variant) {    // 시간대·날씨 변경: 부드럽게 전환
    active = variant;
    document.body.dataset.variant = variant;
    document.body.dataset.weather = weather;
    var oldSlot = slot, newSlot = 1 - slot;
    slot = newSlot;
    root.style.setProperty(newSlot === 0 ? "--freeze-a" : "--freeze-b",
                           freezeOf(variant));
    if (noMotion) {                  // 정지 프레임끼리 즉시 교체
      freezes[newSlot].classList.add("on");
      freezes[oldSlot].classList.remove("on");
      root.style.setProperty("--still", freezeOf(variant));
      return;
    }
    var vNew = vids[newSlot], vOld = vids[oldSlot];
    vNew.src = srcOf(variant);
    vNew.load();
    vNew.addEventListener("canplay", function onReady() {
      vNew.removeEventListener("canplay", onReady);
      // 같은 푸티지이므로 재생 위치를 맞추면 완전한 색상 디졸브가 됨
      try { vNew.currentTime = vOld.currentTime; } catch (e) {}
      vNew.play().catch(function () {});
      requestAnimationFrame(function () {
        vNew.classList.add("on");
        freezes[newSlot].classList.add("on");
        vOld.classList.remove("on");
        freezes[oldSlot].classList.remove("on");
      });
      setTimeout(function () {       // 페이드 종료 후 이전 영상 해제
        vOld.pause();
        vOld.removeAttribute("src");
        vOld.load();
        // 프레임 드랍 대비 정지 프레임도 현재 변형으로 교체
        root.style.setProperty("--still", freezeOf(variant));
      }, 3000);
    });
  }

  /* ── 시계 ──────────────────────────────────────── */
  function render() {
    var now = new Date();

    // 서울 시각 HH:MM
    var t = new Intl.DateTimeFormat("en-GB", {
      timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
    }).formatToParts(now);
    var parts = {};
    t.forEach(function (p) { parts[p.type] = p.value; });
    var hour = String(parseInt(parts.hour, 10) % 24).padStart(2, "0");

    document.getElementById("time").innerHTML =
      hour + '<span class="colon">:</span>' + parts.minute;

    // Jul 3, 2026 형태
    document.getElementById("date").textContent =
      new Intl.DateTimeFormat("en-US", {
        timeZone: TZ, month: "short", day: "numeric", year: "numeric"
      }).format(now);

    // 시간대가 바뀌었으면 배경 크로스페이드
    var v = currentVariant();
    if (v !== active) crossfadeTo(v);
  }

  /* ── 시작: 캐시·강제값이 있으면 대기 없이 즉시 표시,
     캐시 없는 첫 방문만 실황을 최대 900ms 기다림
     (지연·실패 시 일단 맑음으로 시작, 도착하면 전환) ── */
  function sync() {
    var v = currentVariant();
    if (v !== active) crossfadeTo(v);
  }
  var booted = false;
  function boot() {
    if (booted) { sync(); return; }
    booted = true;
    show(currentVariant());
    render();
    setInterval(function () {        // 날씨 실황 5분 주기 갱신
      if (document.hidden) return;   // 복귀 시 아래 핸들러가 재조회
      fetchWeather().then(sync);
    }, 300000);
  }
  fetchWeather().then(boot);
  if (forcedW || cachedW) boot();
  else setTimeout(boot, 900);

  // 탭이 숨겨지면 영상을 멈춰 배터리 절약, 다시 보이면
  // 영상 재개 + 시계·배경 즉시 갱신 + 날씨 재확인
  // (백그라운드에선 타이머가 제한돼 실황이 밀릴 수 있음)
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
      vids[0].pause();
      vids[1].pause();
      return;
    }
    if (!booted) return;
    if (!noMotion && vids[slot].src) {
      vids[slot].play().catch(function () {});
    }
    render();
    if (Date.now() - lastFetch > 60000) fetchWeather().then(sync);
  });

  // 다음 분 경계에 맞춰 갱신 (초 표시가 없으므로 분 단위면 충분)
  function tick() {
    render();
    setTimeout(tick, 60000 - (Date.now() % 60000) + 50);
  }
  setTimeout(tick, 60000 - (Date.now() % 60000) + 50);
})();
</script>

<script>
/* ── 생일 장식(매년 7/21, Asia/Seoul) ─────────────────────────
   내루미는 배경 영상에 구워진 고정 캐릭터다. 영상(과 정지 프레임)은
   object-fit/background 모두 cover로 그려지므로, 프레임 안에서의 머리
   좌표(비율 u,v)를 동일한 cover 변환으로 화면 좌표에 매핑하면 어떤
   화면비에서도 꼬깔모자가 머리 위에 정확히 얹힌다. 시계·배경 코드와
   독립된 IIFE라 여기서 에러가 나도 본체엔 영향 없음.
   테스트: ?bday=1 강제 표시, ?bday=0 강제 숨김 ──────────────── */
(function () {
  var TZ = "Asia/Seoul";
  var params = new URLSearchParams(location.search);

  var BDAY_MONTH = 7, BDAY_DAY = 21;
  function isBirthday() {
    var f = params.get("bday");
    if (f === "1") return true;
    if (f === "0") return false;
    var mm, dd;
    new Intl.DateTimeFormat("en-US", {
      timeZone: TZ, month: "numeric", day: "numeric"
    }).formatToParts(new Date()).forEach(function (x) {
      if (x.type === "month") mm = parseInt(x.value, 10);
      if (x.type === "day")   dd = parseInt(x.value, 10);
    });
    return mm === BDAY_MONTH && dd === BDAY_DAY;
  }

  if (!isBirthday()) return;          // 생일이 아니면 아무것도 안 함
  document.body.classList.add("birthday");

  var VIDEO_AR = 16 / 9;   // 배경 프레임 비율
  var HEAD_U   = 0.517;    // 내루미 머리 꼭대기: 프레임 가로 비율
  var HEAD_V   = 0.712;    // 〃 세로 비율(모자 밑동이 얹히는 지점)

  var hat     = document.getElementById("hat");
  var garland = document.getElementById("garland");

  // 화면을 덮는 배경 프레임의 실제 크기·오프셋(cover) 계산
  function coverBox() {
    var W = innerWidth, H = innerHeight, Dw, Dh;
    if (W / H >= VIDEO_AR) { Dw = W; Dh = W / VIDEO_AR; }
    else                   { Dh = H; Dw = H * VIDEO_AR; }
    return { Dw: Dw, Dh: Dh, left: (W - Dw) / 2, top: (H - Dh) / 2 };
  }

  function placeHat() {
    var b = coverBox();
    hat.style.width = (0.042 * b.Dw) + "px";          // 밑동 너비 ≈ 머리폭
    hat.style.left  = (b.left + HEAD_U * b.Dw) + "px"; // 머리 꼭대기 화면 x
    hat.style.top   = (b.top  + HEAD_V * b.Dh) + "px"; // 〃 y
  }

  // 상단 깃발 줄: 뷰포트 폭에 맞춰 살짝 처진 곡선 + 삼각 깃발
  var COLS = ["#ff6b8b", "#ffce56", "#63c7e8", "#8fd98f", "#f4a3c9", "#ffab73"];
  function buildGarland() {
    var W = innerWidth, cx = W / 2, yEnd = 8, sag = 24;
    function sy(x) { var t = (x - cx) / cx; return yEnd + sag * (1 - t * t); }
    var step = 82, n = Math.floor((W - 24) / step);
    var start = (W - n * step) / 2;
    var d = "M0 " + sy(0).toFixed(1);
    for (var x = 12; x <= W; x += 12) d += " L" + x + " " + sy(x).toFixed(1);
    var flags = "";
    for (var i = 0; i <= n; i++) {
      var fx = start + i * step, w = 28, h = 30;
      var yl = sy(fx - w / 2), yr = sy(fx + w / 2), yc = sy(fx);
      flags += '<path d="M' + (fx - w / 2).toFixed(1) + ' ' + yl.toFixed(1) +
               ' L' + (fx + w / 2).toFixed(1) + ' ' + yr.toFixed(1) +
               ' L' + fx.toFixed(1) + ' ' + (yc + h).toFixed(1) +
               ' Z" fill="' + COLS[i % COLS.length] + '" opacity=".93"/>' +
               '<circle cx="' + fx.toFixed(1) + '" cy="' + yc.toFixed(1) +
               '" r="2.3" fill="#7a5a44"/>';
    }
    garland.innerHTML =
      '<svg width="' + W + '" height="120" viewBox="0 0 ' + W + ' 120" ' +
      'xmlns="http://www.w3.org/2000/svg"><path d="' + d +
      '" fill="none" stroke="#8a6d5a" stroke-width="2.4" ' +
      'stroke-linecap="round"/>' + flags + '</svg>';
  }

  // 색종이(가벼운 낙하) — 움직임 최소화 설정이면 생략
  function buildConfetti() {
    if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    var box = document.getElementById("confetti"), html = "";
    for (var i = 0; i < 15; i++) {
      var l = Math.random() * 100, dur = 8 + Math.random() * 7,
          del = -Math.random() * 12, w = 7 + Math.random() * 5;
      html += '<i class="confetti" style="left:' + l.toFixed(1) +
              'vw;width:' + w.toFixed(1) + 'px;height:' + (w * 1.5).toFixed(1) +
              'px;background:' + COLS[i % COLS.length] +
              ';animation-duration:' + dur.toFixed(1) +
              's;animation-delay:' + del.toFixed(1) + 's;"></i>';
    }
    box.innerHTML = html;
  }

  function layout() { placeHat(); buildGarland(); }
  layout();
  buildConfetti();
  var t;
  addEventListener("resize", function () {
    clearTimeout(t); t = setTimeout(layout, 120);
  });
})();
</script>

</body>
