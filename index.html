<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naerum Naerum</title>
<link rel="icon" type="image/png" href="img/favicon.png">
<link rel="apple-touch-icon" href="img/apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:title" content="내루미">
<meta property="og:url" content="https://naeru.me/">
<meta property="og:image" content="https://naeru.me/img/og.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap"
      rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1f2e; /* 영상 로딩 전 어두운 배경 */
    font-family: "Comfortaa", "Avenir Next", "Apple SD Gothic Neo",
                 -apple-system, sans-serif;
  }

  /* 시간대별 정지 프레임(각 영상의 첫 프레임)은 JS가
     --freeze-a/--freeze-b 변수로 주입한다 */

  /* 루프 순간 브라우저가 비디오를 한 프레임 놓쳐도
     어두운 배경 대신 동일한 정지 프레임이 보이도록,
     첫 프레임(=핑퐁 마지막 프레임)을 영상 뒤에 깔아둠 */
  .bg-still {
    position: fixed;
    inset: 0;
    background-image: var(--freeze-a);
    background-size: cover;
    background-position: center;
  }

  /* ── 배경 영상: A/B 두 장을 겹쳐두고 시간대가 바뀌면
     currentTime을 맞춘 뒤 크로스페이드(같은 원본 영상의
     색보정 변형들이라 픽셀이 정렬됨 → 순수 색상 디졸브) ── */
  video.bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 2.5s ease;
  }
  video.bg.on { opacity: 1; }

  /* ── 구름 고정: 첫 프레임을 하늘 영역에만 덮어서
     구름 움직임을 정지. 영상과 같은 16:9 + cover라서
     창 크기와 무관하게 픽셀이 정확히 정렬됨.
     마스크는 세로(하늘~지평선 위) × 가로(양옆 나무 회피)
     교집합, 경계는 그라디언트로 부드럽게 블렌드.
     비디오와 같은 이유로 A/B 두 장을 겹쳐 크로스페이드 ── */
  .sky-freeze {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 2.5s ease;
    -webkit-mask-image:
      linear-gradient(to bottom,
        black 0%, black 42%, transparent 58%),
      linear-gradient(to right,
        transparent 16%, black 28%, black 68%, transparent 80%);
    -webkit-mask-composite: source-in;
    mask-image:
      linear-gradient(to bottom,
        black 0%, black 42%, transparent 58%),
      linear-gradient(to right,
        transparent 16%, black 28%, black 68%, transparent 80%);
    mask-composite: intersect;
  }
  .sky-freeze.on { opacity: 1; }
  #freezeA { background-image: var(--freeze-a); }
  #freezeB { background-image: var(--freeze-b); }

  /* ── 비 레이어: 하늘 프리즈 위에서도 비가 계속 내리도록
     영상이 아닌 DOM에서 렌더. 줄기는 수직 텍스처, 레이어를
     skewX로 기울여 낙하 방향 = 줄기 축. 텍스처 높이(1024px)
     단위로 background-position을 굴리므로 완벽 루프.
     원경(가늘고 느림)/근경(굵고 빠름) 2겹으로 깊이감 ──── */
  .rain {
    position: fixed;
    inset: -14% -8%;
    pointer-events: none;
    transform: skewX(-8deg);
    background-repeat: repeat;
    opacity: 0;
    visibility: hidden;
    transition: opacity 2.5s ease, visibility 2.5s;
    animation: rainfall linear infinite;
    animation-play-state: paused;
  }
  .rain-far  { background-image: url("img/rain-far.png");  animation-duration: 1.8s; }
  .rain-near { background-image: url("img/rain-near.png"); animation-duration: 0.95s; }
  @keyframes rainfall { to { background-position: 0 1024px; } }
  body[data-weather="rain"] .rain {
    visibility: visible;
    animation-play-state: running;
  }
  body[data-weather="rain"] .rain-far  { opacity: 0.5; }
  body[data-weather="rain"] .rain-near { opacity: 0.62; }
  /* 밤에는 줄기가 너무 하얗게 뜨지 않게 */
  body[data-weather="rain"][data-variant^="night"] .rain-far  { opacity: 0.26; }
  body[data-weather="rain"][data-variant^="night"] .rain-near { opacity: 0.34; }

  /* 은은한 비네트 — cozy한 깊이감, 밤에는 조금 더 깊게 */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
      ellipse at center,
      transparent 55%,
      rgba(10, 14, 25, 0.42) 100%
    );
    opacity: 0.85;
    transition: opacity 2.5s ease;
  }
  body[data-variant^="night"] .vignette { opacity: 1; }
  body[data-variant="day"]    .vignette { opacity: 0.6; }

  /* ── 시계: 내루미를 가리지 않도록 상단 배치 ─────── */
  .clock-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 8vh;
    user-select: none;
  }

  .clock-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    animation: breathe 6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  .time {
    font-size: clamp(3.5rem, 10vw, 7.5rem);
    font-weight: 600;
    letter-spacing: 0.05em;
    color: rgba(255, 252, 245, 0.96);
    text-shadow:
      0 2px 24px rgba(20, 25, 40, 0.55),
      0 0 60px rgba(255, 240, 210, 0.25);
    font-variant-numeric: tabular-nums;
  }

  .time .colon { animation: blink 2s ease-in-out infinite; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }

  .date {
    font-size: clamp(1rem, 2.2vw, 1.5rem);
    font-weight: 400;
    letter-spacing: 0.18em;
    color: rgba(255, 250, 240, 0.85);
    text-shadow: 0 1px 12px rgba(20, 25, 40, 0.6);
  }

  /* 움직임 최소화 설정 존중 */
  @media (prefers-reduced-motion: reduce) {
    .clock-inner, .time .colon { animation: none !important; }
    .rain { display: none !important; }
  }
</style>
</head>
<body>

<div class="bg-still"></div>

<video id="bgA" class="bg" muted loop playsinline preload="auto"></video>
<video id="bgB" class="bg" muted loop playsinline preload="none"></video>

<div id="freezeA" class="sky-freeze"></div>
<div id="freezeB" class="sky-freeze"></div>

<div class="rain rain-far"></div>
<div class="rain rain-near"></div>

<div class="vignette"></div>

<div class="clock-wrap">
  <div class="clock-inner">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>
</div>

<script>
(function () {
  var TZ = "Asia/Seoul";

  /* ── 시간대 → 배경 밴드 ──────────────────────────
     아침노을 05–08 / 낮 08–17 / 저녁노을 17–20 / 밤 20–05
     서울에 비가 오면 "-rain" 변형(흐린 그레이딩+비 레이어).
     URL 강제: ?v=dawn|day|dusk|night, ?h=22, ?w=rain|clear */
  function bandFor(h) {
    if (h >= 5 && h < 8)   return "dawn";
    if (h >= 8 && h < 17)  return "day";
    if (h >= 17 && h < 20) return "dusk";
    return "night";
  }

  var params  = new URLSearchParams(location.search);
  var forced  = params.get("v");
  var fakeH   = params.get("h");
  var forcedW = params.get("w");
  if (["dawn", "day", "dusk", "night"].indexOf(forced) < 0) forced = null;
  if (["rain", "clear"].indexOf(forcedW) < 0) forcedW = null;

  var weather = forcedW === "rain" ? "rain" : "clear";

  function seoulHour(now) {
    if (fakeH !== null) return parseInt(fakeH, 10) % 24;
    return parseInt(new Intl.DateTimeFormat("en-GB", {
      timeZone: TZ, hour: "2-digit", hour12: false
    }).format(now), 10) % 24;
  }

  function currentVariant() {
    var band = forced || bandFor(seoulHour(new Date()));
    return band + (weather === "rain" ? "-rain" : "");
  }

  /* ── 서울 실황 (Open-Meteo, 키 불필요·CORS 허용) ──
     WMO 코드가 강수(이슬비·비·눈·소나기·뇌우)면 rain */
  var METEO = "https://api.open-meteo.com/v1/forecast" +
              "?latitude=37.5665&longitude=126.978&current=weather_code";
  var RAINY = [51, 53, 55, 56, 57, 61, 63, 65, 66, 67,
               71, 73, 75, 77, 80, 81, 82, 85, 86, 95, 96, 99];

  function fetchWeather() {
    if (forcedW) return Promise.resolve();
    return fetch(METEO)
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var c = d && d.current && d.current.weather_code;
        weather = RAINY.indexOf(c) >= 0 ? "rain" : "clear";
      })
      .catch(function () {});   // 실패 시 마지막 상태 유지
  }

  /* ── A/B 비디오 + 하늘 프리즈 크로스페이드 ────── */
  var vids    = [document.getElementById("bgA"), document.getElementById("bgB")];
  var freezes = [document.getElementById("freezeA"), document.getElementById("freezeB")];
  var slot    = 0;          // 현재 활성 슬롯 (0=A, 1=B)
  var active  = null;       // 현재 변형 이름
  var root    = document.documentElement;

  function srcOf(v)    { return "img/meadow-" + v + ".mp4"; }
  function freezeOf(v) { return 'url("img/sky-' + v + '.jpg")'; }

  function show(variant) {           // 최초 로드: 즉시 표시
    active = variant;
    document.body.dataset.variant = variant;
    document.body.dataset.weather = weather;
    root.style.setProperty("--freeze-a", freezeOf(variant));
    var v = vids[slot];
    v.poster = "img/sky-" + variant + ".jpg";
    v.src = srcOf(variant);
    v.classList.add("on");
    freezes[slot].classList.add("on");
    v.play();
  }

  function crossfadeTo(variant) {    // 시간대·날씨 변경: 부드럽게 전환
    active = variant;
    document.body.dataset.variant = variant;
    document.body.dataset.weather = weather;
    var oldSlot = slot, newSlot = 1 - slot;
    slot = newSlot;
    var vNew = vids[newSlot], vOld = vids[oldSlot];
    root.style.setProperty(newSlot === 0 ? "--freeze-a" : "--freeze-b",
                           freezeOf(variant));
    vNew.src = srcOf(variant);
    vNew.load();
    vNew.addEventListener("canplay", function onReady() {
      vNew.removeEventListener("canplay", onReady);
      // 같은 푸티지이므로 재생 위치를 맞추면 완전한 색상 디졸브가 됨
      try { vNew.currentTime = vOld.currentTime; } catch (e) {}
      vNew.play();
      requestAnimationFrame(function () {
        vNew.classList.add("on");
        freezes[newSlot].classList.add("on");
        vOld.classList.remove("on");
        freezes[oldSlot].classList.remove("on");
      });
      setTimeout(function () {       // 페이드 종료 후 이전 영상 해제
        vOld.pause();
        vOld.removeAttribute("src");
        vOld.load();
      }, 3000);
    });
  }

  /* ── 시계 ──────────────────────────────────────── */
  function render() {
    var now = new Date();

    // 서울 시각 HH:MM
    var t = new Intl.DateTimeFormat("en-GB", {
      timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
    }).formatToParts(now);
    var parts = {};
    t.forEach(function (p) { parts[p.type] = p.value; });
    var hour = String(parseInt(parts.hour, 10) % 24).padStart(2, "0");

    document.getElementById("time").innerHTML =
      hour + '<span class="colon">:</span>' + parts.minute;

    // Jul 3, 2026 형태
    document.getElementById("date").textContent =
      new Intl.DateTimeFormat("en-US", {
        timeZone: TZ, month: "short", day: "numeric", year: "numeric"
      }).format(now);

    // 시간대가 바뀌었으면 배경 크로스페이드
    var v = currentVariant();
    if (v !== active) crossfadeTo(v);
  }

  /* ── 시작: 날씨를 최대 900ms까지 기다렸다가 표시
     (지연·실패 시 일단 맑음으로 시작, 도착하면 전환) ── */
  function sync() {
    var v = currentVariant();
    if (v !== active) crossfadeTo(v);
  }
  var booted = false;
  function boot() {
    if (booted) { sync(); return; }
    booted = true;
    show(currentVariant());
    render();
    setInterval(function () {        // 날씨 실황 10분 주기 갱신
      fetchWeather().then(sync);
    }, 600000);
  }
  fetchWeather().then(boot);
  setTimeout(boot, 900);

  // 다음 분 경계에 맞춰 갱신 (초 표시가 없으므로 분 단위면 충분)
  function tick() {
    render();
    setTimeout(tick, 60000 - (Date.now() % 60000) + 50);
  }
  setTimeout(tick, 60000 - (Date.now() % 60000) + 50);
})();
</script>

</body>
</html>
