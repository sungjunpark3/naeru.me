<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meadow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap"
      rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1f2e; /* 영상 로딩 전 어두운 배경 */
    font-family: "Comfortaa", "Avenir Next", "Apple SD Gothic Neo",
                 -apple-system, sans-serif;
  }

  /* 루프 순간 브라우저가 비디오를 한 프레임 놓쳐도
     어두운 배경 대신 동일한 정지 프레임이 보이도록,
     첫 프레임(=핑퐁 마지막 프레임)을 영상 뒤에 깔아둠 */
  .bg-still {
    position: fixed;
    inset: 0;
    background-image: url("img/sky-freeze.jpg");
    background-size: cover;
    background-position: center;
  }

  /* ── 배경 영상 ────────────────────────────────── */
  video.bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ── 구름 고정: 첫 프레임을 하늘 영역에만 덮어서
     구름 움직임을 정지. 영상과 같은 16:9 + cover라서
     창 크기와 무관하게 픽셀이 정확히 정렬됨.
     마스크는 세로(하늘~지평선 위) × 가로(양옆 나무 회피)
     교집합, 경계는 그라디언트로 부드럽게 블렌드 ───── */
  .sky-freeze {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("img/sky-freeze.jpg");
    background-size: cover;
    background-position: center;
    -webkit-mask-image:
      linear-gradient(to bottom,
        black 0%, black 42%, transparent 58%),
      linear-gradient(to right,
        transparent 16%, black 28%, black 68%, transparent 80%);
    -webkit-mask-composite: source-in;
    mask-image:
      linear-gradient(to bottom,
        black 0%, black 42%, transparent 58%),
      linear-gradient(to right,
        transparent 16%, black 28%, black 68%, transparent 80%);
    mask-composite: intersect;
  }

  /* 은은한 비네트 — cozy한 깊이감 */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
      ellipse at center,
      transparent 55%,
      rgba(10, 14, 25, 0.35) 100%
    );
  }

  /* ── 시계: 내루미를 가리지 않도록 상단 배치 ─────── */
  .clock-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 8vh;
    user-select: none;
  }

  .clock-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    animation: breathe 6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  .time {
    font-size: clamp(3.5rem, 10vw, 7.5rem);
    font-weight: 600;
    letter-spacing: 0.05em;
    color: rgba(255, 252, 245, 0.96);
    text-shadow:
      0 2px 24px rgba(20, 25, 40, 0.55),
      0 0 60px rgba(255, 240, 210, 0.25);
    font-variant-numeric: tabular-nums;
  }

  .time .colon { animation: blink 2s ease-in-out infinite; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }

  .date {
    font-size: clamp(1rem, 2.2vw, 1.5rem);
    font-weight: 400;
    letter-spacing: 0.18em;
    color: rgba(255, 250, 240, 0.85);
    text-shadow: 0 1px 12px rgba(20, 25, 40, 0.6);
  }

  /* 움직임 최소화 설정 존중 */
  @media (prefers-reduced-motion: reduce) {
    .clock-inner, .time .colon { animation: none !important; }
  }
</style>
</head>
<body>

<div class="bg-still"></div>

<video class="bg" autoplay muted loop playsinline
       preload="auto" poster="img/sky-freeze.jpg"
       src="img/meadow.mp4"></video>

<div class="sky-freeze"></div>

<div class="vignette"></div>

<div class="clock-wrap">
  <div class="clock-inner">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>
</div>

<script>
(function () {
  var TZ = "Asia/Seoul";

  function render() {
    var now = new Date();

    // 서울 시각 HH:MM
    var t = new Intl.DateTimeFormat("en-GB", {
      timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
    }).formatToParts(now);
    var parts = {};
    t.forEach(function (p) { parts[p.type] = p.value; });
    var hour = String(parseInt(parts.hour, 10) % 24).padStart(2, "0");

    document.getElementById("time").innerHTML =
      hour + '<span class="colon">:</span>' + parts.minute;

    // Jul 3, 2026 형태
    document.getElementById("date").textContent =
      new Intl.DateTimeFormat("en-US", {
        timeZone: TZ, month: "short", day: "numeric", year: "numeric"
      }).format(now);
  }

  render();
  // 다음 분 경계에 맞춰 갱신 (초 표시가 없으므로 분 단위면 충분)
  function tick() {
    render();
    setTimeout(tick, 60000 - (Date.now() % 60000) + 50);
  }
  setTimeout(tick, 60000 - (Date.now() % 60000) + 50);
})();
</script>

</body>
</html>
